<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sub-Pixel Rendering Showcase</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
                "nipplejs": "https://esm.sh/nipplejs"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div id="info-panel">
            <h1>Sub-Pixel Art Rendering</h1>
            <p>Drag slider to Expand/Compress Data</p>
            <div class="slider-container">
                <label for="expansion-slider">Expansion Factor</label>
                <input type="range" id="expansion-slider" min="1" max="64" value="8" step="0.1">
            </div>
            <div class="controls-hint desktop-only">WASD to Move • Mouse to Look</div>
            <div class="controls-hint mobile-only">Use Joystick to Move</div>
        </div>
        <div id="joystick-zone"></div>
    </div>

    <script type="module" src="./js/main.js"></script>
